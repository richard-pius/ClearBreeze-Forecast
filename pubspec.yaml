name: clearbreeze_forecast
description: "A premium weather and air quality forecast app."
publish_to: 'none'
version: 1.1.0+4

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  provider: ^6.1.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  google_fonts: ^8.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
