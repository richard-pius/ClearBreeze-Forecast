name: clearbreeze_forecast
description: "A premium weather and air quality forecast app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  provider: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
